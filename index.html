<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tài liệu kỳ họp thứ 3 HĐND</title>
  <style>
    :root {
      --bg: #eef2f7;
      --panel: #ffffff;
      --text: #172033;
      --muted: #64748b;
      --line: #d9e2ef;
      --accent: #2457d6;
      --shadow: 0 18px 45px rgba(23, 32, 51, 0.12);
      --pdf: #dc2626;
      --word: #2563eb;
      --excel: #16a34a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background: linear-gradient(135deg, #f7f9fc 0%, var(--bg) 100%);
      font-family: Arial, Helvetica, sans-serif;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(290px, 360px) minmax(0, 1fr);
      gap: 18px;
      height: 100vh;
      padding: 18px;
      overflow: hidden;
    }

    .sidebar,
    .viewer {
      min-height: 0;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--line);
    }

    .sidebar-header h1 {
      margin: 0 0 8px;
      font-size: 20px;
      line-height: 1.25;
    }

    .sidebar-header p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px 18px;
      border-bottom: 1px solid var(--line);
    }

    .legend-item,
    .file-tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      color: #ffffff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .legend-item {
      gap: 6px;
      padding: 6px 10px;
    }

    .legend-item::before {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      content: "";
      background: currentColor;
      filter: brightness(1.8);
    }

    .pdf {
      background: var(--pdf);
    }

    .word {
      background: var(--word);
    }

    .excel {
      background: var(--excel);
    }

    .file-list {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 10px;
    }

    .file-button {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      width: 100%;
      margin: 0 0 8px;
      padding: 12px;
      color: inherit;
      text-align: left;
      background: #ffffff;
      border: 1px solid transparent;
      border-radius: 8px;
      cursor: pointer;
      transition: background 160ms ease, border-color 160ms ease, transform 160ms ease;
    }

    .file-button:hover {
      background: #f6f8fc;
      border-color: #cbd7ea;
      transform: translateX(2px);
    }

    .file-button.active {
      background: #eef4ff;
      border-color: #9db7f4;
    }

    .file-title {
      display: block;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.35;
    }

    .file-number {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .file-tag {
      align-self: start;
      min-width: 46px;
      padding: 5px 8px;
    }

    .viewer {
      display: flex;
      flex-direction: column;
    }

    .mobile-bar {
      display: none;
      align-items: center;
      gap: 10px;
      min-height: 54px;
      padding: 0 14px;
      color: #ffffff;
      background: var(--accent);
    }

    .back-button {
      min-height: 36px;
      padding: 0 12px;
      color: #ffffff;
      background: rgba(255, 255, 255, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.34);
      border-radius: 8px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .mobile-title {
      min-width: 0;
      overflow: hidden;
      font-size: 15px;
      font-weight: 700;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .viewer-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: start;
      padding: 22px;
      border-bottom: 1px solid var(--line);
    }

    .viewer-eyebrow {
      margin: 0 0 8px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .viewer-title {
      margin: 0;
      font-size: 25px;
      line-height: 1.28;
    }

    .open-link {
      display: inline-flex;
      align-items: center;
      min-height: 40px;
      padding: 0 14px;
      color: #ffffff;
      background: var(--accent);
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
    }

    .viewer-body {
      flex: 1;
      min-height: 0;
      padding: 22px;
      overflow-y: auto;
      transition: opacity 140ms ease, transform 140ms ease;
    }

    .viewer-body.switching {
      opacity: 0;
      transform: translateY(4px);
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .detail-card {
      padding: 14px;
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .detail-label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .detail-value {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.35;
    }

    .preview {
      display: grid;
      place-items: center;
      min-height: 360px;
      padding: 34px;
      background:
        linear-gradient(90deg, rgba(36, 87, 214, 0.05) 1px, transparent 1px),
        linear-gradient(rgba(36, 87, 214, 0.05) 1px, transparent 1px),
        #fbfdff;
      background-size: 24px 24px;
      border: 1px dashed #b8c7dc;
      border-radius: 8px;
      text-align: center;
    }

    .preview-icon {
      display: inline-grid;
      place-items: center;
      width: 82px;
      height: 82px;
      margin-bottom: 16px;
      color: #ffffff;
      border-radius: 18px;
      font-size: 24px;
      font-weight: 800;
    }

    .preview h2 {
      margin: 0 0 10px;
      font-size: 22px;
    }

    .preview p {
      max-width: 620px;
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .add-doc {
      display: grid;
      gap: 10px;
      padding: 14px 18px;
      background: #f8fafc;
      border-bottom: 1px solid var(--line);
    }

    .add-doc-title {
      margin: 0;
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .add-doc-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
    }

    .add-doc input {
      width: 100%;
      min-height: 40px;
      padding: 0 11px;
      color: var(--text);
      background: #ffffff;
      border: 1px solid #cbd7ea;
      border-radius: 8px;
      font: inherit;
      outline: none;
    }

    .add-doc input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(36, 87, 214, 0.14);
    }

    .add-doc button {
      min-height: 40px;
      padding: 0 13px;
      color: #ffffff;
      background: var(--accent);
      border: 0;
      border-radius: 8px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .add-doc-help {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    @media (max-width: 860px) {
      .app {
        position: relative;
        display: block;
        width: 100%;
        height: 100vh;
        min-height: 100vh;
        padding: 0;
        background: var(--panel);
      }

      .sidebar,
      .viewer {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
        border-radius: 0;
        box-shadow: none;
        transition: transform 260ms ease;
      }

      .sidebar {
        transform: translateX(0);
      }

      .viewer {
        transform: translateX(100%);
      }

      .app.viewing .sidebar {
        transform: translateX(-24%);
      }

      .app.viewing .viewer {
        transform: translateX(0);
      }

      .mobile-bar {
        display: flex;
      }

      .viewer-header,
      .detail-grid {
        grid-template-columns: 1fr;
      }

      .open-link {
        justify-content: center;
      }

      .add-doc-row {
        grid-template-columns: 1fr;
      }

      .add-doc-help {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="sidebar" aria-label="Danh sách tài liệu">
      <div class="sidebar-header">
        <h1>Tài liệu kỳ họp thứ 3</h1>
        <p>Chọn một tài liệu ở menu bên trái để xem nhanh thông tin ở khung bên phải.</p>
      </div>

      <div class="legend" aria-label="Chú giải loại file">
        <span class="legend-item pdf">PDF</span>
        <span class="legend-item word">Word</span>
        <span class="legend-item excel">Excel</span>
      </div>

      <form class="add-doc" id="addDocForm">
        <p class="add-doc-title">Thêm tài liệu mới</p>
        <div class="add-doc-row">
          <input id="newDocTitle" type="text" placeholder="VD: Báo cáo mới.pdf / Kế hoạch.docx / Biểu mẫu.xlsx" autocomplete="off">
          <button type="submit">Thêm</button>
        </div>
        <div class="add-doc-help">
          <span>Nhập kèm đuôi .pdf, .doc, .docx, .xls hoặc .xlsx để tự nhận diện.</span>
          <span class="file-tag pdf" id="newDocType">PDF</span>
        </div>
      </form>

      <div class="file-list" id="fileList"></div>
    </aside>

    <section class="viewer" aria-live="polite">
      <div class="mobile-bar">
        <button class="back-button" id="backButton" type="button">← Danh sách</button>
        <span class="mobile-title" id="mobileTitle">Chi tiết tài liệu</span>
      </div>

      <header class="viewer-header">
        <div>
          <p class="viewer-eyebrow" id="viewerType">PDF</p>
          <h2 class="viewer-title" id="viewerTitle"></h2>
        </div>
        <a class="open-link" id="openLink" href="#" target="_blank" rel="noopener">Mở tài liệu</a>
      </header>

      <div class="viewer-body" id="viewerBody">
        <div class="detail-grid">
          <div class="detail-card">
            <span class="detail-label">Số hiệu</span>
            <span class="detail-value" id="viewerNumber"></span>
          </div>
          <div class="detail-card">
            <span class="detail-label">Định dạng</span>
            <span class="detail-value" id="viewerFormat"></span>
          </div>
          <div class="detail-card">
            <span class="detail-label">Nhóm tài liệu</span>
            <span class="detail-value">Kỳ họp HĐND</span>
          </div>
        </div>

        <div class="preview">
          <div>
            <div class="preview-icon" id="previewIcon">PDF</div>
            <h2 id="previewTitle"></h2>
            <p id="previewText"></p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const basePath = "file:///C:/Users/Admin/Downloads/T%C3%A0i%20li%E1%BB%87u%20k%E1%BB%B3%20h%E1%BB%8Dp%20th%E1%BB%A9%203%20g%E1%BB%ADi%20%C4%91%E1%BA%A1i%20bi%E1%BB%83u%20H%C4%90ND/T%C3%A0i%20li%E1%BB%87u%20k%E1%BB%B3%20h%E1%BB%8Dp%20th%E1%BB%A9%203%20g%E1%BB%ADi%20%C4%91%E1%BA%A1i%20bi%E1%BB%83u%20H%C4%90ND/";

    const documents = [
      { number: "25", title: "BC công tác chỉ đạo điều hành của UBND xã 6 tháng năm 2026", file: "(25). BC công tác chỉ đạo điều hành của UBND xã 6 tháng năm 2026.doc", type: "word" },
      { number: "24", title: "BC công tác tiếp dân, PCTN, Lãng phí 6 tháng đầu năm 2026", file: "(24). BC công tác tiếp dân, PCTN, Lãng phi 6 tháng đầu năm 2026.docx", type: "word" },
      { number: "23", title: "Báo cáo phát triển KT-XH 6 tháng đầu năm 2026", file: "(23). Báo cáo phát triển KT-XH 6 tháng đầu năm 2026 (Chuẩn).docx", type: "word" },
      { number: "22", title: "Báo cáo BCH quân sự xã", file: "(22). Báo cáo BCH quân sự xã.pdf", type: "pdf" },
      { number: "21", title: "Báo cáo của Công an xã", file: "(21). Báo cáo của Công an xã.pdf", type: "pdf" },
      { number: "20", title: "Thông báo MTTQ xây dựng chính quyền 6 tháng đầu năm; phương hướng 6 tháng cuối năm 2026", file: "(20). Thông báo MT xây dựng chính quyền 6 tháng đầu năm; Phương hướng nhiệm vụ 6 tháng cuối năm 2026.pdf", type: "pdf" },
      { number: "19-2", title: "Biểu kèm theo NQ đầu tư công năm 2026", file: "(19-2). Biểu kèm theo NQ đầu tư công năm 2026.xlsx", type: "excel" },
      { number: "19", title: "Tờ trình bổ sung đầu tư công năm 2026", file: "(19). TTR bổ sung đầu tư công năm 2026.pdf", type: "pdf" },
      { number: "18-2", title: "Biểu kèm theo NQ đầu tư công giai đoạn 2026-2030", file: "(18-2). Biểu kèm theo NQ đầu tư công giai đoạn 2026-2030.xlsx", type: "excel" },
      { number: "18", title: "Tờ trình bổ sung đầu tư công 2026 - 2030", file: "(18). TTr bổ sung đầu tư công 2026 - 2030.pdf", type: "pdf" },
      { number: "17-2", title: "Biểu kinh phí Trung tâm DVSNC", file: "(17-2). Biểu kinh phí trung tâm DVSNC.xlsx", type: "excel" },
      { number: "17", title: "Tờ trình phân bổ kinh phí Trung tâm dịch vụ sự nghiệp công", file: "(17). TTr phân bổ kinh phí Trung tâm dịch vụ sự nghiệp công.pdf", type: "pdf" },
      { number: "16-1", title: "Phụ lục kèm theo BC thu-chi ngân sách 6 tháng đầu năm 2026", file: "(16-1). Phụ lục kèm theo BC thu-chi ngân sách 6 tháng đầu năm 2026.pdf", type: "pdf" },
      { number: "16", title: "BC kết quả thu-chi ngân sách 6 tháng đầu năm 2026", file: "(16). BC kết quả thu-chi ngân sách 6 tháng đầu năm 2026.pdf", type: "pdf" },
      { number: "13-4", title: "Tờ trình thông qua Đề án sáp nhập thôn", file: "(13-4). TTr thông qua Đề án sáp nhập thôn.pdf", type: "pdf" },
      { number: "13-3", title: "Phụ lục kèm báo cáo tổng hợp ý kiến", file: "(13-3). Phụ lục kèm báo cáo tổng hợp ý kiến.pdf", type: "pdf" },
      { number: "13-2", title: "BC tổng hợp ý kiến sáp nhập thôn", file: "(13-2). BC tổng hợp ý kiến sáp nhập thôn.pdf", type: "pdf" },
      { number: "13-1", title: "Đề án sắp xếp, tổ chức lại thôn trên địa bàn xã Rạng Đông", file: "(13-1) Đề án sắp xếp, tổ chức lại thôn trên địa bàn xã Rạng Đông.pdf", type: "pdf" },
      { number: "12", title: "Chương trình kỳ họp thứ ba", file: "(12). Chương trình kỳ họp thứ ba.docx", type: "word" },
      { number: "11", title: "BC tổng hợp ý kiến của cử tri trước kỳ họp", file: "(11). BC tổng hợp ý của cử tri trước kỳ họp.pdf", type: "pdf" },
      { number: "10-2", title: "Chương trình hoạt động toàn khoá", file: "(10-2). Chương trình hoạt đông toàn khoá.pdf", type: "pdf" },
      { number: "10", title: "Tờ trình ban hành Chương trình hoạt động toàn khoá của HĐND", file: "(10). TTr ban hành Chương trình hoạt động toàn khoá của HĐND.pdf", type: "pdf" },
      { number: "09", title: "BC kết quả hoạt động 6 tháng của TT HĐND", file: "(09) BC kết quả hoạt động 6 tháng của TT HĐND.pdf", type: "pdf" }
    ];

    const typeInfo = {
      pdf: { label: "PDF", className: "pdf", name: "Tài liệu PDF", note: "Tệp PDF có thể mở trực tiếp trên trình duyệt nếu trình duyệt hỗ trợ xem PDF." },
      word: { label: "Word", className: "word", name: "Tài liệu Word", note: "Tệp Word sẽ mở bằng ứng dụng mặc định trên máy khi bạn bấm Mở tài liệu." },
      excel: { label: "Excel", className: "excel", name: "Bảng tính Excel", note: "Tệp Excel sẽ mở bằng ứng dụng bảng tính mặc định trên máy khi bạn bấm Mở tài liệu." }
    };

    const fileList = document.getElementById("fileList");
    const app = document.querySelector(".app");
    const addDocForm = document.getElementById("addDocForm");
    const newDocTitle = document.getElementById("newDocTitle");
    const newDocType = document.getElementById("newDocType");
    const backButton = document.getElementById("backButton");
    const mobileTitle = document.getElementById("mobileTitle");
    const viewerBody = document.getElementById("viewerBody");
    const viewerType = document.getElementById("viewerType");
    const viewerTitle = document.getElementById("viewerTitle");
    const viewerNumber = document.getElementById("viewerNumber");
    const viewerFormat = document.getElementById("viewerFormat");
    const openLink = document.getElementById("openLink");
    const previewIcon = document.getElementById("previewIcon");
    const previewTitle = document.getElementById("previewTitle");
    const previewText = document.getElementById("previewText");

    function getFileUrl(fileName) {
      return basePath + encodeURIComponent(fileName).replace(/%2F/g, "/");
    }

    function escapeHtml(value) {
      return value
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function inferType(value) {
      const cleanValue = value.trim().toLowerCase();
      if (/\.(doc|docx)$/.test(cleanValue)) return "word";
      if (/\.(xls|xlsx)$/.test(cleanValue)) return "excel";
      return "pdf";
    }

    function getTitleFromFile(value) {
      return value.trim().replace(/\.(pdf|doc|docx|xls|xlsx)$/i, "");
    }

    function updateNewDocBadge() {
      const info = typeInfo[inferType(newDocTitle.value)];
      newDocType.textContent = info.label;
      newDocType.className = `file-tag ${info.className}`;
    }

    function showViewer() {
      app.classList.add("viewing");
    }

    function showList() {
      app.classList.remove("viewing");
    }

    function renderList() {
      fileList.innerHTML = documents.map((doc, index) => {
        const info = typeInfo[doc.type];
        return `
          <button class="file-button" type="button" data-index="${index}">
            <span>
              <span class="file-title">${escapeHtml(doc.title)}</span>
              <span class="file-number">Mục ${escapeHtml(doc.number)}</span>
            </span>
            <span class="file-tag ${info.className}">${info.label}</span>
          </button>
        `;
      }).join("");
    }

    function selectDocument(index) {
      const doc = documents[index];
      const info = typeInfo[doc.type];

      document.querySelectorAll(".file-button").forEach((button) => {
        button.classList.toggle("active", Number(button.dataset.index) === index);
      });

      viewerBody.classList.add("switching");

      window.setTimeout(() => {
        viewerType.textContent = info.name;
        viewerTitle.textContent = doc.title;
        mobileTitle.textContent = doc.title;
        viewerNumber.textContent = `Mục ${doc.number}`;
        viewerFormat.textContent = info.label;
        openLink.href = getFileUrl(doc.file);
        previewIcon.textContent = info.label;
        previewIcon.className = `preview-icon ${info.className}`;
        previewTitle.textContent = doc.file;
        previewText.textContent = info.note;
        viewerBody.classList.remove("switching");
      }, 120);
    }

    fileList.addEventListener("click", (event) => {
      const button = event.target.closest(".file-button");
      if (!button) return;
      selectDocument(Number(button.dataset.index));
      showViewer();
    });

    backButton.addEventListener("click", showList);

    newDocTitle.addEventListener("input", updateNewDocBadge);

    addDocForm.addEventListener("submit", (event) => {
      event.preventDefault();

      const value = newDocTitle.value.trim();
      if (!value) {
        newDocTitle.focus();
        return;
      }

      const type = inferType(value);
      const fileName = /\.(pdf|doc|docx|xls|xlsx)$/i.test(value) ? value : `${value}.${type === "word" ? "docx" : type === "excel" ? "xlsx" : "pdf"}`;
      const title = getTitleFromFile(value);

      documents.unshift({
        number: `Mới ${documents.filter((doc) => String(doc.number).startsWith("Mới")).length + 1}`,
        title,
        file: fileName,
        type
      });

      renderList();
      selectDocument(0);
      showViewer();
      addDocForm.reset();
      updateNewDocBadge();
    });

    renderList();
    selectDocument(0);
  </script>
</body>
</html>
